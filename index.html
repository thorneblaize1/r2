<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #ffe3ec 0%, #ffb3c6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.2);
            text-align: center;
            max-width: 400px;
            width: 85%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            position: relative;
        }

        .heart-icon {
            font-size: 3.5rem;
            color: #d90429;
            margin-bottom: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #2b2d42;
            font-size: 1.8rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            height: 50px;
        }

        button {
            width: 110px;
            height: 48px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #yesBtn {
            background-color: #00b4d8; 
            color: #ffffff;
        }

        #noBtn {
            background-color: #2b2d42; 
            color: #ffffff;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 999;
        }

        .success-message {
            display: none;
            color: #d90429;
            font-size: 1.5rem;
            font-weight: bold;
            animation: fadeIn 0.5s ease forwards;
        }

            from { opacity: 0; transform: translateY(10px); }
            to {
