<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle, #ffe3ec 0%, #ffb3c6 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 2.5rem 1.5rem;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 75, 110, 0.2);
            text-align: center;
            max-width: 400px;
            width: 85%;
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .heart-icon {
            font-size: 3.5rem;
            color: #d90429;
            margin-bottom: 1rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            color: #2b2d42;
            font-size: 1.8rem;
            margin-bottom: 2.5rem;
            font-weight: 700;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            height: 50px;
            position: relative;
        }

        button {
            width: 110px;
            height: 48px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            touch-action: manipulation;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #yesBtn {
            background-color: #00b4d8; 
            color: #ffffff;
        }

        #noBtn {
            background-color: #2b2d42; 
            color: #ffffff;
            transition: left 0.2s ease, top 0.2s ease; 
        }

        .success-message {
            display: none;
            color: #d90429;
            font-size: 1.5rem;
            font-weight: bold;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 2.5rem 1rem;
            }
            h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="card">
        <div id="interactive-content">
            <div class="heart-icon">❤️</div>
            <h1>Do you hate me?</h1>
            <div class="btn-container">
                <button id="yesBtn">Yes</button>
                <button id="noBtn">No</button>
            </div>
        </div>
        <div class="success-message" id="successMsg">
            <div style="font-size: 4rem; margin-bottom: 1rem;">😭💔</div>
            I knew it...<br>
            <span style="font-size: 1rem; color: #555; font-weight: normal; margin-top: 10px; display: block;">(Your answer has been registered)</span>
        </div>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const card = document.getElementById('card');
        const interactiveContent = document.getElementById('interactive-content');
        const successMsg = document.getElementById('successMsg');

        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1513127708719321189/7wzTrQfTvsTXPNxJoInbuiu4Obn7b8jKanm52Qnnag71A0zKA2piKocVpcQ44XljJusL';

        let isFirstClick = true;

        // A controlled pattern layout (X, Y offsets from current spot) to keep it nearby but out of reach
        const movementPattern = [
            { x: -50,  y: -90 },
            { x: 70,   y: -100 },
            { x: -80,  y: 80 },
            { x: 90,   y: 70 },
            { x: -60,  y: -110 },
            { x: 80,   y: -70 },
            { x: -90,  y: 60 },
            { x: 70,   y: 90 }
        ];
        let patternIndex = 0;

        function moveButton(e) {
            if (e) e.preventDefault();

            // Lock current static layout position right before transferring to fixed setup
            if (isFirstClick) {
                const rect = noBtn.getBoundingClientRect();
                noBtn.style.position = 'fixed';
                noBtn.style.left = `${rect.left}px`;
                noBtn.style.top = `${rect.top}px`;
                isFirstClick = false;
            }

            const currentLeft = parseFloat(noBtn.style.left);
            const currentTop = parseFloat(noBtn.style.top);

            const safetyBuffer = 20;
            const maxX = window.innerWidth - noBtn.offsetWidth - safetyBuffer;
            const maxY = window.innerHeight - noBtn.offsetHeight - safetyBuffer;

            // Get next jump directions from preset list
            let move = movementPattern[patternIndex];
            patternIndex = (patternIndex + 1) % movementPattern.length;

            let targetX = currentLeft + move.x;
            let targetY = currentTop + move.y;

            // Strict correction system to cleanly bounce away from phone edges without breaking layout boundary limits
            if (targetX < safetyBuffer) targetX = safetyBuffer + Math.abs(move.x);
            if (targetX > maxX) targetX = maxX - Math.abs(move.x);
            if (targetY < safetyBuffer) targetY = safetyBuffer + Math.abs(move.y);
            if (targetY > maxY) targetY = maxY - Math.abs(move.y);

            // Double check safety clamp values
            if (targetX < safetyBuffer) targetX = safetyBuffer;
            if (targetX > maxX) targetX = maxX;
            if (targetY < safetyBuffer) targetY = safetyBuffer;
            if (targetY > maxY) targetY = maxY;

            noBtn.style.left = `${targetX}px`;
            noBtn.style.top = `${targetY}px`;
        }

        noBtn.addEventListener('click', moveButton);

        yesBtn.addEventListener('click', () => {
            interactiveContent.style.display = 'none';
            successMsg.style.display = 'block';
            card.style.borderColor = '#d90429';

            fetch(DISCORD_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    embeds: [{
                        title: "💔 Response Received!",
                        description: "She finally clicked **YES**, she hates you!",
                        color: 14222377,
                        timestamp: new Date().toISOString()
                    }]
                })
            }).catch(err => console.error('Error sending webhook:', err));
        });
    </script>
</body>
</html>
